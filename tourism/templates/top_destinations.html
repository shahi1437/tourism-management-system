{% extends 'base.html' %}

{% block content %}

<h2>Top Rated Destinations</h2>

<div class="row">

{% for d in destinations %}
    <div class="col-md-4 mb-4">
        <div class="card p-3 shadow-sm">
            <h5>{{ d.name }}</h5>
            <p>⭐ {{ d.avg_rating|default:"No ratings" }}</p>

            <a href="/destinations/{{ d.id }}/" class="btn btn-primary btn-sm">
                View
            </a>
        </div>
    </div>
{% endfor %}

</div>

{% endblock %}
